title: "💡 "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## Share your idea!
        We'd love to hear your suggestions for new features, improvements, or integrations.

  - type: dropdown
    id: plugin
    attributes:
      label: Related Plugin
      description: Which plugin is this idea related to? (Optional — select "General" for cross-plugin ideas)
      options:
        - General / Cross-Plugin
        - Accessibility Compliance Helper Pro
        - ADR Companion
        - API Contract Guard
        - API-First Mocking Studio
        - Architecture Breadcrumbs
        - BDD Test Automation
        - Branch Health Dashboard
        - Dead Code Drift Radar
        - Dependency License Lens
        - Docstring Freshness Monitor
        - Flaky Test Detector
        - Git-Aware Dev Journal
        - Git Workflow Enforcer
        - GPU Dev Accelerator Ultimate
        - Intel DPC++ Plugin
        - Kubernetes Context Guard
        - Local Secrets Tripwire
        - LogParser
        - Metal GPU Monitor
        - Metal Shader Support
        - Obfuscate Guard
        - Obsidian Bridge
        - Robot Framework Plugin
        - Run Config Drift Detector
        - Selenium IQ Plugin
        - Slow Build Hotspots
        - Structurizr Plugin
        - Technical Debt Accountant
        - Terminal Safety Rails
        - VulnSpeed Plugin
        - Zero Trust Secret Guardian
    validations:
      required: false

  - type: textarea
    id: idea
    attributes:
      label: Your Idea
      description: Describe your idea in detail.
    validations:
      required: true
